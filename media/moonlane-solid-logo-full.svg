<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1280" viewBox="0 0 1280 1280" fill="none">

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="1280" fill="#0A0A14"/>

  <!-- Mask that subtracts the cutout circle -->
  <mask id="crescent-mask">
    <rect x="0" y="0" width="1280" height="1280" fill="white"/>
    <circle cx="706" cy="598" r="210" fill="black"/>
  </mask>

  <!-- Crescent moon (centered) -->
  <g>
    <circle cx="640" cy="640" r="258" fill="#D94FCC" mask="url(#crescent-mask)"/>
  </g>

  <!-- Main star -->
  <path d="M823 379
           L847 451
           L919 475
           L847 499
           L823 571
           L799 499
           L727 475
           L799 451 Z"
        fill="#8B3DFF"/>

  <!-- Small star -->
  <path d="M700 595
           L712 622
           L739 631
           L712 640
           L700 667
           L688 640
           L661 631
           L688 622 Z"
        fill="#D94FCC"/>

</svg>
