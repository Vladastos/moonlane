<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1280" viewBox="0 0 1280 1280" fill="none">

  <!-- Black rounded square behind moon and stars -->
  <rect x="384" y="384" width="512" height="512" rx="48" ry="48" fill="#0A0A14"/>

  <!-- Mask that subtracts the cutout circle -->
  <mask id="crescent-mask">
    <rect x="0" y="0" width="1280" height="1280" fill="white"/>
    <circle cx="684" cy="612" r="140" fill="black"/>
  </mask>

  <!-- Crescent moon (centered) -->
  <g>
    <circle cx="640" cy="640" r="172" fill="#D94FCC" mask="url(#crescent-mask)"/>
  </g>

  <!-- Main star -->
  <path d="M762 466
           L778 514
           L826 530
           L778 546
           L762 594
           L746 546
           L698 530
           L746 514 Z"
        fill="#8B3DFF"/>

  <!-- Small star -->
  <path d="M680 610
           L688 628
           L706 634
           L688 640
           L680 658
           L672 640
           L654 634
           L672 628 Z"
        fill="#D94FCC"/>

</svg>
