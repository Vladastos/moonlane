<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="320" viewBox="0 0 1200 320" fill="none">

  <rect x="32" y="32" width="1100" height="256" rx="24" ry="24" fill="#eaeafc"/>

  <!-- Left chevron -->
  <path d="M90 160 L125 125 M90 160 L125 195"
        stroke="#8B3DFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Mask that subtracts the cutout circle -->
  <mask id="crescent-mask">
    <rect x="0" y="0" width="1200" height="320" fill="white"/>
    <circle cx="272" cy="144" r="70" fill="black"/>
  </mask>

  <!-- Crescent moon (thicker) -->
  <g>
    <circle cx="250" cy="160" r="86" fill="#D94FCC" mask="url(#crescent-mask)"/>
  </g>

  <!-- Star  -->
  <path d="M311 66
           L319 90
           L343 98
           L319 106
           L311 130
           L303 106
           L279 98
           L303 90 Z"
        fill="#8B3DFF"/>

<!-- Small star (moved further down) -->
<path d="M270 124
         L274 133
         L283 136
         L274 139
         L270 148
         L266 139
         L257 136
         L266 133 Z"
      fill="#D94FCC"/>


  <!-- Right chevron  -->
  <path d="M368 125 L403 160 M368 195 L403 160"
        stroke="#8B3DFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Divider -->
  <line x1="470" y1="70" x2="470" y2="250" stroke="#111111" stroke-width="4" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="570" y="195" font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="88" font-weight="700" fill="#0A0A14" letter-spacing="-3">
  moonlane
</text>

</svg>
